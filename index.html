<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>统计与概率乐园</title>
  
  <!-- 引用manifest文件 -->
  <link rel="manifest" href="manifest.json">
  
  <!-- 苹果设备图标 -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  
  <!-- 浏览器标签页图标 - 关键部分 -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  
  <!-- 主题颜色 -->
  <meta name="theme-color" content="#42a5f5">
  
  <style>
    body {
      background: linear-gradient(135deg, #42a5f5, #ff9f4b);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 15px;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 40px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    h1 {
      color: #333;
      font-size: 2.5rem;
      margin: 20px 0;
    }
    .icon-large {
      font-size: 80px;
    }
    button {
      background: #ff9f4b;
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 0 #b26a00;
      transition: 0.1s;
      margin-top: 20px;
    }
    button:active {
      transform: translateY(5px);
      box-shadow: none;
    }
    .note {
      color: #666;
      margin-top: 20px;
      font-size: 0.9rem;
      background: #f5f5f5;
      padding: 10px;
      border-radius: 20px;
    }
    .version-tag {
      margin-top: 20px;
      color: #888;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-large">📊</div>
    <h1>统计与概率乐园</h1>
    <p>这是一个PWA测试页面，用于验证图标是否正确显示。</p>
    <button onclick="alert('测试成功！')">点击测试</button>
    <div class="note">
      ✅ 浏览器标签页应有蓝色直方图图标<br>
      📲 地址栏右侧应有安装图标（加号）<br>
      ⚙️ 按 F12 → Application → Manifest 可查看配置
    </div>
    <div class="version-tag">
      版本 v3.0 · 2026年3月
    </div>
  </div>

  <script>
    // 注册Service Worker（如果有的话）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(err => {
          console.log('Service Worker 未注册:', err);
        });
      });
    }
  </script>
</body>
</html>
